<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML Research Dashboard — Vo Duc</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sql.js@1.10.2/dist/sql-wasm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
<style>
:root{
  /* spacing 8px grid */
  --s0:4px;--s1:8px;--s2:12px;--s3:16px;--s4:24px;--s5:32px;--s6:48px;
  /* radius */
  --rs:4px;--rm:8px;--rl:12px;--rx:20px;
  /* colors — GitHub dark refined */
  --bg:#0a0d12;--surf1:#0f141b;--surf2:#161b22;--surf3:#1c2128;--surf4:#21262d;
  --b1:#262d36;--b2:#30363d;--b3:#444c56;
  --t1:#e6edf3;--t2:#9ba3ad;--t3:#6e7681;--t4:#4d535c;
  --accent:#58a6ff;--accent-soft:#58a6ff22;--accent-strong:#79c0ff;
  --green:#3fb950;--green-soft:#3fb95022;
  --amber:#d29922;--amber-soft:#d2992222;
  --red:#f85149;--red-soft:#f8514922;
  --purple:#bc8cff;--purple-soft:#bc8cff22;
  --pink:#ff7eb6;
  /* phase tokens */
  --c-found:#58a6ff;--c-w14:#bc8cff;--c-p2:#d29922;--c-p3:#f85149;--c-goal:#3fb950;
  /* type */
  --font:'Inter','Be Vietnam Pro',-apple-system,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
  /* fx */
  --sh1:0 2px 8px rgba(0,0,0,.4);--sh2:0 8px 24px rgba(0,0,0,.55);
  --tr:.18s ease;--trL:.26s cubic-bezier(.4,0,.2,1);
}
html[lang="vi"]{--font:'Be Vietnam Pro','Inter',-apple-system,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--t1);font-size:14px;-webkit-font-smoothing:antialiased}
::selection{background:var(--accent-soft);color:var(--t1)}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--b3)}
button{font-family:inherit;color:inherit}
input,textarea{font-family:inherit}
a{color:var(--accent);text-decoration:none}
a:hover{color:var(--accent-strong);text-decoration:underline}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:var(--rs)}
.mono{font-family:var(--mono)}

/* ── LOADING ── */
#loading{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity .4s}
#loading.hide{opacity:0;pointer-events:none}
.spin{width:32px;height:32px;border:2.5px solid var(--b2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@keyframes fadeinR{from{opacity:0;transform:translateX(6px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{stroke-width:2;stroke-opacity:.95}50%{stroke-width:5;stroke-opacity:.3}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

/* ── APP SHELL ── */
#app{height:100vh;display:flex;flex-direction:column}

/* HEADER */
.hdr{min-height:56px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:8px var(--s4);background:var(--surf1);border-bottom:1px solid var(--b1);position:relative;z-index:50;gap:var(--s2);flex-wrap:wrap}
.hdr-l{display:flex;align-items:center;gap:var(--s2);min-width:0}
.hdr-logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#4a90d9,#bc8cff);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;box-shadow:0 2px 8px rgba(88,166,255,.3);flex-shrink:0}
.hdr-ttl{font-size:.92rem;font-weight:600;letter-spacing:-.01em;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-sub{font-size:.68rem;color:var(--t3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-r{display:flex;gap:var(--s1);align-items:center;flex-wrap:wrap}
@media(max-width:640px){.hdr-sub{display:none}}

/* BADGES */
.bdg{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:var(--rx);font-size:.7rem;font-weight:600;border:1px solid;transition:all var(--tr);white-space:nowrap}
.bdg-streak{background:#ff7eb622;color:var(--pink);border-color:#ff7eb644}
.bdg-day{background:var(--accent-soft);color:var(--accent);border-color:#58a6ff44}
.bdg-pct{background:var(--amber-soft);color:var(--amber);border-color:#d2992244}
.bdg-dim{background:#8b949e15;color:var(--t2);border-color:#8b949e22}
.bdg-green{background:var(--green-soft);color:var(--green);border-color:#3fb95044}
.db-dot{width:6px;height:6px;border-radius:50%;background:var(--t3);transition:all .4s}
.db-dot.on{background:var(--green);box-shadow:0 0 6px var(--green)}

/* HEADER BUTTONS */
.h-btn{background:var(--surf2);border:1px solid var(--b1);color:var(--t2);border-radius:var(--rm);padding:6px 12px;font-size:.72rem;font-weight:600;cursor:pointer;transition:all var(--tr);display:inline-flex;align-items:center;gap:5px}
.h-btn:hover{background:var(--surf3);color:var(--t1);border-color:var(--b3)}
.h-btn.icon{width:32px;height:32px;padding:0;justify-content:center}
.h-btn.lang{font-family:var(--mono);font-size:.7rem;letter-spacing:.04em}

/* TABS */
.tabs{flex-shrink:0;display:flex;background:var(--surf1);border-bottom:1px solid var(--b1);padding:0 var(--s4);gap:2px;overflow-x:auto;overflow-y:hidden;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:11px 16px;background:none;border:none;border-bottom:2px solid transparent;color:var(--t2);font-size:.82rem;font-weight:500;cursor:pointer;transition:all var(--tr);display:inline-flex;align-items:center;gap:6px;line-height:1;white-space:nowrap;flex-shrink:0}
.tab:hover{color:var(--t1)}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.tab .tab-ico{font-size:.95rem}

/* PANES — flex:1 lets them take remaining vertical space; each wrapper handles its own scroll */
.pane{flex:1 1 0;min-height:0;animation:fadein .22s ease}

/* ──────── TODAY PANE ──────── */
.today-wrap{overflow-y:auto;overflow-x:hidden;padding:var(--s4) var(--s4) var(--s5)}
.today-body{max-width:880px;margin:0 auto;display:flex;flex-direction:column;gap:var(--s3)}
.card{background:var(--surf1);border:1px solid var(--b1);border-radius:var(--rl);padding:var(--s3) var(--s4);transition:border-color var(--tr)}
.card:hover{border-color:var(--b2)}
.card-lg{padding:var(--s4) var(--s4)}
.card-ttl{font-size:.68rem;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:var(--s2);display:flex;align-items:center;gap:6px}
.card-ttl .ttl-ico{font-size:.95rem}

/* greeting card */
.greet{display:flex;align-items:center;gap:var(--s4);background:linear-gradient(135deg,#0f141b,#1a1c2e);border:1px solid var(--b1);border-radius:var(--rl);padding:var(--s4);position:relative;overflow:hidden}
.greet::before{content:'';position:absolute;top:-30%;right:-10%;width:240px;height:240px;background:radial-gradient(circle,#58a6ff1c,transparent 70%);pointer-events:none}
.greet::after{content:'';position:absolute;bottom:-40%;left:30%;width:200px;height:200px;background:radial-gradient(circle,#bc8cff1a,transparent 70%);pointer-events:none}
.greet-ring{flex-shrink:0;position:relative}
.greet-ring svg{display:block;transform:rotate(-90deg)}
.greet-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;color:var(--t1);letter-spacing:-.02em}
.greet-pct small{font-size:.65rem;font-weight:500;color:var(--t3);margin-left:1px}
.greet-info{flex:1;min-width:0;position:relative;z-index:1}
.greet-hi{font-size:1.3rem;font-weight:700;letter-spacing:-.02em;margin-bottom:2px}
.greet-date{font-size:.85rem;color:var(--t2);margin-bottom:var(--s2)}
.greet-meta{display:flex;gap:var(--s2);flex-wrap:wrap}

/* focus card */
.focus{background:var(--surf1);border:1px solid var(--b1);border-radius:var(--rl);overflow:hidden}
.focus-hd{padding:var(--s3) var(--s4);border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;gap:var(--s2)}
.focus-week{font-size:.7rem;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.focus-week b{color:var(--t1);font-weight:700;margin-left:6px}
.focus-body{padding:var(--s4)}
.focus-task{font-size:1rem;line-height:1.55;font-weight:500;color:var(--t1);margin-bottom:var(--s3)}
.focus-actions{display:flex;align-items:center;gap:var(--s2);flex-wrap:wrap}
.bigchk{display:inline-flex;align-items:center;gap:10px;padding:10px 16px;background:var(--surf2);border:1px solid var(--b1);border-radius:var(--rm);cursor:pointer;font-size:.85rem;font-weight:500;transition:all var(--tr)}
.bigchk:hover{background:var(--surf3);border-color:var(--accent)}
.bigchk.done{background:var(--green-soft);border-color:#3fb95066;color:var(--green)}
.bigchk-box{width:18px;height:18px;border-radius:5px;border:2px solid var(--b3);display:inline-flex;align-items:center;justify-content:center;transition:all var(--tr)}
.bigchk.done .bigchk-box{background:var(--green);border-color:var(--green);color:#0a0d12}
.book-chip{display:inline-flex;align-items:center;gap:5px;padding:8px 13px;background:var(--surf2);border:1px solid var(--b1);border-radius:var(--rm);font-size:.78rem;color:var(--t2);text-decoration:none;transition:all var(--tr);font-weight:500}
.book-chip:hover{background:var(--surf3);color:var(--accent);border-color:var(--accent);text-decoration:none}

/* two-column row */
.row2{display:grid;grid-template-columns:1fr 1fr;gap:var(--s3)}
@media(max-width:780px){.row2{grid-template-columns:1fr}}

/* pomodoro */
.pom{display:flex;align-items:center;gap:var(--s4)}
.pom-clock{flex-shrink:0;position:relative;width:120px;height:120px}
.pom-clock svg{transform:rotate(-90deg)}
.pom-time{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:var(--mono);font-size:1.55rem;font-weight:600;letter-spacing:-.02em}
.pom-time small{font-size:.6rem;color:var(--t3);font-family:var(--font);margin-top:2px;text-transform:uppercase;letter-spacing:.1em;font-weight:500}
.pom-right{flex:1;min-width:0;display:flex;flex-direction:column;gap:var(--s2)}
.pom-btns{display:flex;gap:6px}
.btn{padding:8px 14px;border-radius:var(--rm);border:1px solid var(--b1);background:var(--surf2);color:var(--t1);font-size:.78rem;font-weight:500;cursor:pointer;transition:all var(--tr);display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:var(--surf3);border-color:var(--b3)}
.btn-prim{background:var(--accent);border-color:var(--accent);color:#0a0d12;font-weight:600}
.btn-prim:hover{background:var(--accent-strong);border-color:var(--accent-strong);color:#0a0d12}
.btn-danger{background:var(--red-soft);border-color:#f8514944;color:var(--red)}
.btn-danger:hover{background:var(--red);color:#0a0d12;border-color:var(--red)}
.btn-sm{padding:5px 10px;font-size:.72rem}
.pom-presets{display:flex;gap:4px}
.pom-pre{padding:4px 9px;background:var(--surf2);border:1px solid var(--b1);border-radius:var(--rs);font-size:.7rem;color:var(--t2);cursor:pointer;transition:all var(--tr)}
.pom-pre:hover{color:var(--t1)}
.pom-pre.on{background:var(--accent-soft);color:var(--accent);border-color:var(--accent)}
.pom-stat{font-size:.72rem;color:var(--t3)}

/* note */
.qnote{display:flex;flex-direction:column;gap:var(--s1)}
textarea.ta{width:100%;min-height:88px;background:var(--surf2);border:1px solid var(--b1);border-radius:var(--rm);padding:10px 12px;color:var(--t1);font-size:.85rem;line-height:1.55;resize:vertical;transition:border-color var(--tr);font-family:inherit}
textarea.ta:focus{outline:none;border-color:var(--accent)}
textarea.ta::placeholder{color:var(--t4)}
.ta-bar{display:flex;align-items:center;justify-content:space-between;gap:8px}
.saved-tag{font-size:.68rem;color:var(--green);opacity:0;transition:opacity .3s}
.saved-tag.on{opacity:1}

/* this week mini */
.wkmini{display:flex;align-items:center;gap:var(--s3)}
.wkmini-left{flex:1;min-width:0}
.wkmini-ttl{font-size:.88rem;font-weight:600;margin-bottom:4px}
.wkmini-meta{font-size:.72rem;color:var(--t3);margin-bottom:var(--s2)}
.wkmini-bar{height:6px;background:var(--surf3);border-radius:3px;overflow:hidden}
.wkmini-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--purple));border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* ──────── GRAPH PANE ──────── */
.graph-wrap{display:flex;flex-direction:row;position:relative;overflow:hidden}
.graph-toolbar{position:absolute;top:var(--s3);left:var(--s3);right:var(--s3);display:flex;gap:var(--s2);align-items:center;z-index:20;flex-wrap:wrap}
.gsearch{position:relative;flex:1;max-width:280px}
.gsearch input{width:100%;background:var(--surf1);border:1px solid var(--b1);border-radius:var(--rm);padding:8px 12px 8px 32px;color:var(--t1);font-size:.82rem;transition:border-color var(--tr)}
.gsearch input:focus{outline:none;border-color:var(--accent);background:var(--surf2)}
.gsearch input::placeholder{color:var(--t4)}
.gsearch-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:.85rem;pointer-events:none}
.gfilters{display:flex;gap:4px;flex-wrap:wrap}
.gfilter{padding:6px 11px;background:var(--surf1);border:1px solid var(--b1);border-radius:var(--rx);color:var(--t2);font-size:.72rem;font-weight:500;cursor:pointer;transition:all var(--tr);display:inline-flex;align-items:center;gap:5px}
.gfilter:hover{color:var(--t1);background:var(--surf2)}
.gfilter.on{background:var(--accent-soft);color:var(--accent);border-color:var(--accent)}
.gfilter-dot{width:7px;height:7px;border-radius:50%}

.gcanvas{flex:1;position:relative;overflow:hidden;background:var(--bg)}
.gcanvas::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,#30363d 1px,transparent 1px);background-size:32px 32px;opacity:.25;pointer-events:none}
.gcanvas svg{width:100%;height:100%;cursor:grab;display:block}
.gcanvas svg:active{cursor:grabbing}

.glegend{position:absolute;bottom:var(--s3);left:var(--s3);z-index:10;background:var(--surf1);border:1px solid var(--b1);border-radius:var(--rm);padding:10px 12px;font-size:.72rem;backdrop-filter:blur(6px)}
.leg{display:flex;align-items:center;gap:7px;margin:3px 0;color:var(--t2);font-weight:500}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.gctrl{position:absolute;bottom:var(--s3);right:var(--s3);z-index:10;display:flex;flex-direction:column;gap:4px}
.gbtn{width:32px;height:32px;background:var(--surf1);border:1px solid var(--b1);color:var(--t2);border-radius:var(--rm);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.95rem;transition:all var(--tr)}
.gbtn:hover{background:var(--surf2);color:var(--t1);border-color:var(--accent)}

.glink{fill:none;stroke:#3d444d;stroke-opacity:.55;stroke-width:1.6;transition:stroke .2s,stroke-opacity .2s,stroke-width .2s}
.glink.lit{stroke:var(--accent);stroke-opacity:1;stroke-width:2.3}
.glink.prereq{stroke:var(--amber);stroke-opacity:.9;stroke-width:2.1}
.gnode{cursor:pointer}
.gnode .ring{transition:r .18s,opacity .18s,filter .18s,stroke-width .18s}
.gnode .core{transition:r .18s,opacity .18s}
.gnode text{font-family:var(--font);font-size:10.5px;fill:#e6edf3;pointer-events:none;text-anchor:middle;font-weight:700;letter-spacing:.01em;paint-order:stroke fill;stroke:#0a0d12;stroke-width:3px;stroke-linejoin:round}
.gnode:hover .ring{filter:url(#glow);stroke-width:2.4}
.gnode.dim .ring,.gnode.dim .core,.gnode.dim text{opacity:.08}
.gnode.sel .ring{animation:pulse 2s ease infinite}

/* graph info panel */
.gipanel{width:0;flex-shrink:0;background:var(--surf1);border-left:1px solid var(--b1);overflow:hidden;transition:width var(--trL);position:relative}
.gipanel.on{width:320px}
.gipanel-in{width:320px;padding:var(--s4);height:100%;overflow-y:auto}
.gipanel-x{position:absolute;top:12px;right:12px;width:26px;height:26px;background:none;border:1px solid var(--b1);border-radius:var(--rs);color:var(--t3);cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;transition:all var(--tr)}
.gipanel-x:hover{background:var(--surf2);color:var(--t1);border-color:var(--accent)}
.gipanel-ttl{font-size:1.05rem;font-weight:700;letter-spacing:-.01em;margin-bottom:var(--s1);padding-right:30px}
.gipanel-meta{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:var(--s3)}
.gipanel-desc{font-size:.85rem;color:var(--t2);line-height:1.65;margin-bottom:var(--s3)}
.gipanel-book{padding:10px 12px;background:var(--surf2);border-radius:var(--rm);border-left:3px solid var(--accent);font-size:.78rem;margin-bottom:var(--s3);display:flex;align-items:center;justify-content:space-between;gap:10px}
.gipanel-book b{color:var(--t1)}
.gipanel-tool{display:flex;gap:6px;margin-bottom:var(--s3);flex-wrap:wrap}
.gipanel-lbl{font-size:.68rem;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;font-weight:600;margin-bottom:var(--s1)}
.relchips{display:flex;flex-wrap:wrap;gap:4px}
.relchip{padding:4px 10px;background:var(--surf2);border:1px solid var(--b1);border-radius:var(--rx);font-size:.72rem;cursor:pointer;transition:all var(--tr);color:var(--t2);font-weight:500}
.relchip:hover{background:var(--surf3);transform:translateY(-1px)}

/* ──────── ROADMAP PANE ──────── */
.rm-wrap{overflow-y:auto;overflow-x:hidden;padding:var(--s4)}
.rm-body{max-width:880px;margin:0 auto;display:flex;flex-direction:column;gap:var(--s1)}
.ph-bar{display:flex;align-items:center;gap:var(--s2);padding:10px 14px;border-radius:var(--rm);margin:var(--s3) 0 var(--s1);font-weight:700;font-size:.85rem}
.ph-bar .ph-pct{margin-left:auto;font-weight:500;font-size:.72rem;opacity:.9}
.ph-bar .ph-ico{font-size:1.05rem}
.wkc{background:var(--surf1);border:1px solid var(--b1);border-radius:var(--rl);overflow:hidden;transition:border-color var(--tr),box-shadow var(--tr)}
.wkc:hover{border-color:var(--b2)}
.wkc.now{border-color:#58a6ff66;box-shadow:0 0 0 1px #58a6ff22}
.wkc.done{opacity:.72}
.wkc-hd{padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;user-select:none;transition:background var(--tr)}
.wkc-hd:hover{background:var(--surf2)}
.wkn{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0;border:1.8px solid;font-family:var(--mono)}
.wki{flex:1;min-width:0}
.wkttl{font-size:.92rem;font-weight:600;line-height:1.3}
.wkdt{font-size:.72rem;color:var(--t3);margin-top:2px}
.wkr{display:flex;align-items:center;gap:10px;flex-shrink:0}
.wkmb{width:60px;height:4px;background:var(--surf3);border-radius:2px;overflow:hidden}
.wkmf{height:100%;border-radius:2px;transition:width .5s ease}
.wkp{font-size:.72rem;color:var(--t3);min-width:28px;text-align:right;font-family:var(--mono);font-weight:500}
.wkarr{color:var(--t3);font-size:.95rem;transition:transform var(--tr)}
.wkc.open .wkarr{transform:rotate(90deg)}
.wkb{display:none;padding:0 16px 14px;border-top:1px solid var(--b1)}
.wkc.open .wkb{display:block;animation:fadein .25s ease}
.seclb{font-size:.68rem;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;font-weight:600;margin:14px 0 7px;display:flex;align-items:center;justify-content:space-between;gap:8px}

.dtbl{width:100%;border-collapse:collapse;font-size:.8rem}
.dtbl tr{transition:background .12s}
.dtbl tr:hover{background:var(--surf2)}
.dtbl td{padding:7px 8px;border-bottom:1px solid var(--b1);color:var(--t2);vertical-align:top;line-height:1.5}
.dtbl tr.today td{background:var(--accent-soft)}
.dtbl tr.tdone td{color:var(--t3)}
.dtbl tr.tdone .dtask{text-decoration:line-through}
.dtbl td:nth-child(1){width:30px;padding-right:0}
.dtbl td:nth-child(2){width:96px;color:var(--t3);font-family:var(--mono);font-size:.74rem;white-space:nowrap}
.dtbl tr:last-child td{border-bottom:none}
.dchk{width:16px;height:16px;border-radius:4px;border:1.6px solid var(--b3);background:var(--surf2);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;color:#0a0d12;transition:all var(--tr);flex-shrink:0;margin-top:2px}
.dchk:hover{border-color:var(--accent)}
.dchk.on{background:var(--green);border-color:var(--green)}

.tasks{display:flex;flex-direction:column;gap:2px}
.tk{display:flex;align-items:flex-start;gap:9px;padding:6px 8px;border-radius:var(--rs);cursor:pointer;transition:background .12s}
.tk:hover{background:var(--surf2)}
.tk input{width:15px;height:15px;accent-color:var(--green);cursor:pointer;flex-shrink:0;margin-top:2px}
.tk label{cursor:pointer;font-size:.85rem;color:var(--t2);line-height:1.5;transition:color .2s}
.tk.done label{text-decoration:line-through;color:var(--t3)}
.note-prev{padding:10px 12px;background:var(--surf2);border-radius:var(--rm);border:1px solid var(--b1);font-size:.85rem;line-height:1.6;color:var(--t2);margin-top:8px;min-height:40px}
.note-prev p{margin:.4em 0}
.note-prev p:first-child{margin-top:0}
.note-prev p:last-child{margin-bottom:0}
.note-prev code{background:var(--surf3);padding:1px 5px;border-radius:3px;font-family:var(--mono);font-size:.85em}
.note-prev pre{background:var(--surf3);padding:8px 10px;border-radius:var(--rs);overflow-x:auto;margin:.5em 0}
.note-prev ul,.note-prev ol{margin:.5em 0 .5em 1.2em}
.note-prev h1,.note-prev h2,.note-prev h3{font-size:1em;font-weight:700;margin:.6em 0 .3em;color:var(--t1)}
.dchap{display:inline-flex;align-items:center;gap:4px;padding:1px 6px;background:var(--surf3);border:1px solid var(--b1);border-radius:4px;color:var(--accent);font-size:.74rem;font-weight:500;text-decoration:none;margin-left:4px;transition:all var(--tr)}
.dchap:hover{background:var(--accent-soft);text-decoration:none}

/* ──────── PROGRESS PANE ──────── */
.pg-wrap{overflow-y:auto;overflow-x:hidden;padding:var(--s4)}
.pg-body{max-width:780px;margin:0 auto;display:flex;flex-direction:column;gap:var(--s3)}
.overall{background:linear-gradient(135deg,var(--surf1),#1a1c2e);border:1px solid var(--b1);border-radius:var(--rl);padding:var(--s4);position:relative;overflow:hidden}
.overall::before{content:'';position:absolute;top:-50px;right:-50px;width:200px;height:200px;background:radial-gradient(circle,#58a6ff11,transparent 70%);pointer-events:none}
.ov-top{display:flex;align-items:flex-end;gap:var(--s3);margin-bottom:var(--s3);position:relative}
.ov-num{font-size:3.2rem;font-weight:800;letter-spacing:-.04em;line-height:1;background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;background-clip:text;color:transparent}
.ov-r{padding-bottom:6px;flex:1}
.ov-lbl{font-size:.85rem;color:var(--t3);margin-bottom:2px}
.ov-tasks{font-size:.9rem;color:var(--t1);font-weight:500}
.ov-bar{height:8px;background:var(--surf3);border-radius:4px;overflow:hidden}
.ov-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#58a6ff,#bc8cff,#d29922,#f85149,#3fb950);transition:width .8s cubic-bezier(.4,0,.2,1)}
.ov-foot{display:flex;gap:var(--s3);margin-top:var(--s3);padding-top:var(--s3);border-top:1px solid var(--b1)}
.ov-stat{flex:1}
.ov-stat-v{font-size:1.3rem;font-weight:700;color:var(--t1);letter-spacing:-.02em}
.ov-stat-l{font-size:.7rem;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-top:1px}

/* heatmap */
.heatcard{background:var(--surf1);border:1px solid var(--b1);border-radius:var(--rl);padding:var(--s3) var(--s4)}
.heat-grid{display:flex;gap:3px;margin-top:var(--s2);overflow-x:auto;padding-bottom:6px}
.heat-col{display:flex;flex-direction:column;gap:3px;flex-shrink:0}
.heat-cell{width:14px;height:14px;border-radius:3px;background:#21262d;transition:transform .12s,box-shadow .12s;cursor:default}
.heat-cell.future{background:#161b22;border:1px dashed #2d333b}
.heat-cell.l1{background:#0e4429}
.heat-cell.l2{background:#006d32}
.heat-cell.l3{background:#26a641}
.heat-cell.l4{background:#39d353;box-shadow:0 0 6px #39d35355}
.heat-cell:hover{transform:scale(1.4);z-index:5;box-shadow:0 0 8px rgba(0,0,0,.6)}
.heat-foot{display:flex;align-items:center;justify-content:space-between;margin-top:var(--s2);font-size:.7rem;color:var(--t3)}
.heat-scale{display:flex;align-items:center;gap:5px}
.heat-scale-cells{display:inline-flex;gap:2px;margin:0 4px}

.prog-card{background:var(--surf1);border:1px solid var(--b1);border-radius:var(--rl);padding:14px 16px;transition:border-color var(--tr)}
.prog-card:hover{border-color:var(--b2)}
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:8px}
.prog-name{font-size:.85rem;font-weight:500}
.prog-cnt{font-size:.72rem;color:var(--t2);font-family:var(--mono)}
.pbar{height:6px;background:var(--surf3);border-radius:3px;overflow:hidden}
.pbfill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.motiv{padding:14px 16px;background:var(--surf1);border:1px solid #3fb95044;border-radius:var(--rl);border-left:3px solid var(--green);font-size:.85rem;color:var(--t2);line-height:1.65}

/* ──────── LIBRARY PANE ──────── */
.lib-wrap{overflow-y:auto;overflow-x:hidden;padding:var(--s4)}
.lib-body{max-width:1000px;margin:0 auto;display:flex;flex-direction:column;gap:var(--s4)}
.lib-banner{padding:10px 14px;background:var(--amber-soft);border:1px solid #d2992244;border-radius:var(--rm);font-size:.76rem;color:var(--amber);display:flex;align-items:flex-start;gap:8px}
.lib-banner b{color:var(--t1)}
.lib-sec-ttl{font-size:.78rem;font-weight:700;color:var(--t1);text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:8px;margin-bottom:var(--s2);padding-bottom:8px;border-bottom:1px solid var(--b1)}
.lib-sec-ttl .ico{font-size:1rem}

.book-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:var(--s2)}
.bcard{background:var(--surf1);border:1px solid var(--b1);border-radius:var(--rl);padding:var(--s3);display:flex;flex-direction:column;gap:8px;transition:all var(--tr);position:relative;overflow:hidden}
.bcard:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--sh1)}
.bcard-top{display:flex;align-items:flex-start;gap:12px}
.bcover{width:54px;height:72px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;box-shadow:0 4px 12px rgba(0,0,0,.4)}
.bcard-info{flex:1;min-width:0}
.bttl{font-size:.92rem;font-weight:700;line-height:1.3;margin-bottom:3px;color:var(--t1)}
.bauthor{font-size:.74rem;color:var(--t3);line-height:1.4}
.bmeta{display:flex;gap:4px;flex-wrap:wrap}
.bbtns{display:flex;gap:6px;margin-top:auto}
.bbtns .btn{flex:1;justify-content:center}

.slide-ttl{flex:1;font-size:.88rem;font-weight:500}
.exams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:var(--s2)}
.ex-card{padding:18px 16px;background:var(--surf1);border:1px solid var(--b1);border-radius:var(--rl);text-align:center;cursor:pointer;transition:all var(--tr);text-decoration:none;color:inherit;display:flex;flex-direction:column;align-items:center;gap:6px}
.ex-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--sh1);text-decoration:none;color:inherit}
.ex-card .ex-ico{font-size:1.7rem;margin-bottom:4px}
.ex-card .ex-lbl{font-size:.88rem;font-weight:600;color:var(--t1)}
.ex-card .ex-sub{font-size:.7rem;color:var(--t3)}

/* SETTINGS DRAWER */
.drawer-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;opacity:0;pointer-events:none;transition:opacity var(--trL);backdrop-filter:blur(2px)}
.drawer-bg.on{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100vh;width:380px;max-width:100vw;background:var(--surf1);border-left:1px solid var(--b1);z-index:201;transform:translateX(100%);transition:transform var(--trL);display:flex;flex-direction:column;box-shadow:-8px 0 32px rgba(0,0,0,.4)}
.drawer.on{transform:translateX(0)}
.drawer-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--b1);flex-shrink:0}
.drawer-ttl{font-size:.95rem;font-weight:700}
.drawer-body{flex:1;overflow-y:auto;padding:20px}
.drawer-foot{padding:14px 20px;border-top:1px solid var(--b1);font-size:.7rem;color:var(--t3);text-align:center;flex-shrink:0}
.set-grp{margin-bottom:24px}
.set-lbl{font-size:.7rem;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;font-weight:600;margin-bottom:8px}
.set-desc{font-size:.74rem;color:var(--t3);margin-top:4px;line-height:1.5}
.lang-toggle{display:flex;background:var(--surf2);border:1px solid var(--b1);border-radius:var(--rm);padding:3px;gap:2px}
.lang-toggle button{flex:1;padding:8px 12px;background:none;border:none;color:var(--t2);font-size:.8rem;font-weight:600;cursor:pointer;border-radius:6px;transition:all var(--tr)}
.lang-toggle button.on{background:var(--accent);color:#0a0d12}
.pom-pick{display:flex;gap:4px}
.pom-pick button{flex:1;padding:8px;background:var(--surf2);border:1px solid var(--b1);border-radius:var(--rm);color:var(--t2);font-size:.78rem;font-weight:600;cursor:pointer;transition:all var(--tr)}
.pom-pick button.on{background:var(--accent-soft);color:var(--accent);border-color:var(--accent)}
.set-btn-row{display:flex;flex-direction:column;gap:8px}
.danger-zone{padding:14px;background:var(--red-soft);border:1px solid #f8514944;border-radius:var(--rm)}
.danger-ttl{font-size:.78rem;color:var(--red);font-weight:700;margin-bottom:6px}
.danger-desc{font-size:.74rem;color:var(--t2);line-height:1.55;margin-bottom:10px}
.confirm-input{width:100%;background:var(--surf2);border:1px solid var(--b1);border-radius:var(--rs);padding:6px 10px;color:var(--t1);font-size:.8rem;margin-bottom:8px}
.confirm-input:focus{outline:none;border-color:var(--red)}

/* TOOLTIP */
#tip{position:fixed;pointer-events:none;z-index:500;background:var(--surf3);border:1px solid var(--b3);border-radius:var(--rm);padding:8px 12px;font-size:.76rem;color:var(--t1);box-shadow:var(--sh2);opacity:0;transition:opacity .12s;max-width:240px;line-height:1.5}
#tip.on{opacity:1}
#tip .tip-meta{font-size:.68rem;color:var(--t3);margin-top:3px}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surf3);border:1px solid var(--b3);border-radius:var(--rm);padding:10px 16px;font-size:.82rem;color:var(--t1);box-shadow:var(--sh2);opacity:0;pointer-events:none;transition:all .25s;z-index:600;display:flex;align-items:center;gap:8px}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* utility */
.gap8{display:flex;gap:8px;align-items:center}
.muted{color:var(--t3)}
.right{margin-left:auto}
.copy-mini{padding:4px 7px;background:transparent;border:1px solid var(--b1);border-radius:4px;color:var(--t3);font-size:.66rem;cursor:pointer;transition:all var(--tr)}
.copy-mini:hover{color:var(--accent);border-color:var(--accent)}
</style>

function fmtDate(d, lang){
  const wd = (lang==='vi'?WD_VI:WD_EN)[d.getDay()];
  if(lang==='vi') return `${wd}, ${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
  return `${wd}, ${MO_EN[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}
function fmtShortDate(d, lang){
  if(lang==='vi') return `${(lang==='vi'?WD_VI:WD_EN)[d.getDay()]} ${d.getDate()}/${d.getMonth()+1}`;
  return `${WD_EN[d.getDay()]} ${MO_EN[d.getMonth()]} ${d.getDate()}`;
}
function isoDate(d){const z=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}`;}

// Map chapter references in daily tasks → PDF file
function resolveRef(ref){
  if(!ref) return null;
  if(ref.startsWith('MML')){
    const ch = ref.split('#')[1];
    return {book:'MML', ch, file:BOOKS[0].file};
  }
  if(ref.startsWith('D2L') || ref.startsWith('d2l')){
    return {book:'D2L', file:BOOKS[1].file};
  }
  if(ref.startsWith('MLCB')) return {book:'MLCB', file:BOOKS[2].file};
  if(ref.startsWith('DLCB')) return {book:'DLCB', file:BOOKS[3].file};
  if(ref.startsWith('SLIDE')){
    const ch = parseInt(ref.split('#')[1]);
    const s = SLIDES.find(x=>x.ch===ch);
    return s ? {slide:true, ch, file:s.file} : null;
  }
  return null;
}

// DATABASE (sql.js + IndexedDB persistence)
// ════════════════════════════════════════════════════════════════════
const START_DATE = new Date('2026-05-25T00:00:00');
const END_DATE   = new Date('2026-08-16T23:59:59');

let db = null;
const IDB_NAME='MLDash2', IDB_STORE='data', IDB_KEY='mldb';
function openIDB(){
  return new Promise((res, rej)=>{
    const r = indexedDB.open(IDB_NAME, 1);
    r.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE);
    r.onsuccess = e => res(e.target.result);
    r.onerror = rej;
  });
}
async function idbGet(){
  const idb = await openIDB();
  return new Promise(res=>{
    const tx = idb.transaction(IDB_STORE, 'readonly');
    const req = tx.objectStore(IDB_STORE).get(IDB_KEY);
    req.onsuccess = ()=> res(req.result || null);
    req.onerror = ()=> res(null);
  });
}
async function idbPut(data){
  const idb = await openIDB();
  return new Promise((res, rej)=>{
    const tx = idb.transaction(IDB_STORE, 'readwrite');
    const req = tx.objectStore(IDB_STORE).put(data, IDB_KEY);
    req.onsuccess = res; req.onerror = rej;
  });
}
async function idbClear(){
  const idb = await openIDB();
  return new Promise((res, rej)=>{
    const tx = idb.transaction(IDB_STORE, 'readwrite');
    const req = tx.objectStore(IDB_STORE).clear();
    req.onsuccess = res; req.onerror = rej;
  });
}
async function initDB(SQL){
  const saved = await idbGet();
  db = saved ? new SQL.Database(saved) : new SQL.Database();
  db.run(`CREATE TABLE IF NOT EXISTS tasks(
    week_num INTEGER, task_idx INTEGER, done INTEGER DEFAULT 0,
    updated_at TEXT, PRIMARY KEY(week_num, task_idx))`);
  db.run(`CREATE TABLE IF NOT EXISTS notes(
    week_num INTEGER PRIMARY KEY, content TEXT DEFAULT '', updated_at TEXT)`);
  db.run(`CREATE TABLE IF NOT EXISTS settings(
    key TEXT PRIMARY KEY, value TEXT)`);
  db.run(`CREATE TABLE IF NOT EXISTS day_log(
    date TEXT PRIMARY KEY,
    minutes_studied INTEGER DEFAULT 0,
    tasks_done INTEGER DEFAULT 0,
    note TEXT DEFAULT '')`);
  db.run(`CREATE TABLE IF NOT EXISTS day_tasks(
    week_num INTEGER, day_idx INTEGER, done INTEGER DEFAULT 0,
    updated_at TEXT, PRIMARY KEY(week_num, day_idx))`);
  await saveDB();
}
let _saveTimer=null;
async function saveDB(){
  if(!db) return;
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async ()=>{
    try{ await idbPut(db.export()); }catch(e){console.warn('save failed',e)}
  }, 80);
}

// settings (all guarded against null db — components may call these before DB init resolves)
function setSetting(k,v){
  if(!db) return;
  db.run(`INSERT OR REPLACE INTO settings(key,value) VALUES(?,?)`,[k,String(v)]);
  saveDB();
}
function getSetting(k, def){
  if(!db) return def;
  const r = db.exec(`SELECT value FROM settings WHERE key='${k}'`);
  return r.length && r[0].values.length ? r[0].values[0][0] : def;
}

// week tasks
function dbGetTask(wn, ti){
  if(!db) return false;
  const r = db.exec(`SELECT done FROM tasks WHERE week_num=${wn} AND task_idx=${ti}`);
  return r.length && r[0].values.length ? r[0].values[0][0]===1 : false;
}
function dbSetTask(wn, ti, done){
  if(!db) return;
  db.run(`INSERT OR REPLACE INTO tasks(week_num,task_idx,done,updated_at) VALUES(?,?,?,datetime('now'))`,[wn,ti,done?1:0]);
  saveDB();
}

// day tasks (per day-of-week)
function dbGetDayTask(wn, di){
  if(!db) return false;
  const r = db.exec(`SELECT done FROM day_tasks WHERE week_num=${wn} AND day_idx=${di}`);
  return r.length && r[0].values.length ? r[0].values[0][0]===1 : false;
}
function dbSetDayTask(wn, di, done){
  if(!db) return;
  db.run(`INSERT OR REPLACE INTO day_tasks(week_num,day_idx,done,updated_at) VALUES(?,?,?,datetime('now'))`,[wn,di,done?1:0]);
  saveDB();
}

// notes (week-level)
function dbGetNote(wn){
  if(!db) return '';
  const r = db.exec(`SELECT content FROM notes WHERE week_num=${wn}`);
  return r.length && r[0].values.length ? (r[0].values[0][0]||'') : '';
}
function dbSetNote(wn, txt){
  if(!db) return;
  db.run(`INSERT OR REPLACE INTO notes(week_num,content,updated_at) VALUES(?,?,datetime('now'))`,[wn,txt]);
  saveDB();
}

// day log
function dbGetDayLog(date){
  if(!db) return {minutes:0, tasks:0, note:''};
  const r = db.exec(`SELECT minutes_studied,tasks_done,note FROM day_log WHERE date='${date}'`);
  if(r.length && r[0].values.length){
    const [m,t,n] = r[0].values[0];
    return {minutes:m||0, tasks:t||0, note:n||''};
  }
  return {minutes:0, tasks:0, note:''};
}
function dbAddMinutes(date, m){
  if(!db) return;
  const cur = dbGetDayLog(date);
  db.run(`INSERT OR REPLACE INTO day_log(date,minutes_studied,tasks_done,note) VALUES(?,?,?,?)`,
    [date, cur.minutes+m, cur.tasks, cur.note]);
  saveDB();
}
function dbBumpTaskCount(date, delta){
  if(!db) return;
  const cur = dbGetDayLog(date);
  db.run(`INSERT OR REPLACE INTO day_log(date,minutes_studied,tasks_done,note) VALUES(?,?,?,?)`,
    [date, cur.minutes, Math.max(0,cur.tasks+delta), cur.note]);
  saveDB();
}
function dbSetDayNote(date, note){
  if(!db) return;
  const cur = dbGetDayLog(date);
  db.run(`INSERT OR REPLACE INTO day_log(date,minutes_studied,tasks_done,note) VALUES(?,?,?,?)`,
    [date, cur.minutes, cur.tasks, note]);
  saveDB();
}
function dbAllDayLogs(){
  if(!db) return {};
  const r = db.exec(`SELECT date,minutes_studied,tasks_done,note FROM day_log`);
  if(!r.length) return {};
  const out = {};
  r[0].values.forEach(([d,m,t,n])=>{out[d]={minutes:m||0,tasks:t||0,note:n||''}});
  return out;
}

function exportDB(){
  if(!db) return;
  const data = db.export();
  const blob = new Blob([data], {type:'application/x-sqlite3'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `ml_dashboard_${isoDate(new Date())}.db`;
  a.click();
}
async function importDBFile(file, SQL){
  const buf = await file.arrayBuffer();
  const arr = new Uint8Array(buf);
  db = new SQL.Database(arr);
  await idbPut(arr);
}
async function resetProgress(SQL){
  await idbClear();
  db = new SQL.Database();
  db.run(`CREATE TABLE IF NOT EXISTS tasks(week_num INTEGER, task_idx INTEGER, done INTEGER DEFAULT 0, updated_at TEXT, PRIMARY KEY(week_num,task_idx))`);
  db.run(`CREATE TABLE IF NOT EXISTS notes(week_num INTEGER PRIMARY KEY, content TEXT DEFAULT '', updated_at TEXT)`);
  db.run(`CREATE TABLE IF NOT EXISTS settings(key TEXT PRIMARY KEY, value TEXT)`);
  db.run(`CREATE TABLE IF NOT EXISTS day_log(date TEXT PRIMARY KEY, minutes_studied INTEGER DEFAULT 0, tasks_done INTEGER DEFAULT 0, note TEXT DEFAULT '')`);
  db.run(`CREATE TABLE IF NOT EXISTS day_tasks(week_num INTEGER, day_idx INTEGER, done INTEGER DEFAULT 0, updated_at TEXT, PRIMARY KEY(week_num,day_idx))`);
  await saveDB();
}

// PROGRESS / STREAK helpers
// ════════════════════════════════════════════════════════════════════
function curWeek(){
  const now = Date.now();
  if(now < START_DATE.getTime()) return 0;
  if(now > END_DATE.getTime()) return 12;
  return Math.min(12, Math.max(1, Math.floor((now-START_DATE.getTime())/(7*864e5))+1));
}
function curDayIdx(){
  // 0=Mon..6=Sun in our WEEKS structure
  const now = Date.now();
  if(now < START_DATE.getTime()) return -1;
  const dim = (new Date().getDay()+6)%7; // Mon=0..Sun=6
  return dim;
}
function daysUntilStart(){
  const diff = START_DATE.getTime() - Date.now();
  return Math.max(0, Math.ceil(diff/864e5));
}
function dayOfJourney(){
  const diff = Math.floor((Date.now() - START_DATE.getTime())/864e5)+1;
  if(diff<1) return 0; if(diff>84) return 84; return diff;
}
function weekProgress(wn){
  const w = WEEKS.find(x=>x.n===wn);
  if(!w) return {tot:0,done:0,pct:0};
  const tot = w.tasks.length;
  const done = w.tasks.reduce((s,_,i)=>s+(dbGetTask(wn,i)?1:0),0);
  return {tot, done, pct:tot?Math.round(100*done/tot):0};
}
function phaseProgress(ph){
  let tot=0, done=0;
  WEEKS.filter(w=>w.ph===ph).forEach(w=>{const p=weekProgress(w.n); tot+=p.tot; done+=p.done;});
  return {tot, done, pct:tot?Math.round(100*done/tot):0};
}
function totalProgress(){
  let tot=0, done=0;
  WEEKS.forEach(w=>{const p=weekProgress(w.n); tot+=p.tot; done+=p.done;});
  return {tot, done, pct:tot?Math.round(100*done/tot):0};
}
function computeStreak(){
  const logs = dbAllDayLogs();
  let streak = 0;
  const d = new Date();
  for(let i=0;i<400;i++){
    const k = isoDate(d);
    if(logs[k] && logs[k].tasks>0){ streak++; }
    else if(i===0){ /* today not yet logged is ok */ }
    else break;
    d.setDate(d.getDate()-1);
  }
  return streak;
}
function totalMinutes(){
  const logs = dbAllDayLogs();
  return Object.values(logs).reduce((s,l)=>s+(l.minutes||0),0);
}
function activeDays(){
  const logs = dbAllDayLogs();
  return Object.values(logs).filter(l=>l.tasks>0).length;
}

// Pomodoro beep via Web Audio
function playBeep(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 660; g.gain.value = 0.12;
    o.start(); o.frequency.exponentialRampToValueAtTime(440, ctx.currentTime+.5);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+.6);
    o.stop(ctx.currentTime+.7);
  }catch(e){}
}

async function copyToClipboard(txt){
  try{ await navigator.clipboard.writeText(txt); return true; }catch(e){
    const ta = document.createElement('textarea'); ta.value = txt;
    document.body.appendChild(ta); ta.select(); try{document.execCommand('copy')}catch(_){};
    document.body.removeChild(ta); return true;
  }
}

      ctx.toggleDayTask(ctx.cw.value, di);

    // ring chart for overall %
    const ringDash = computed(()=>{
      const r=32, c=2*Math.PI*r;

    const pomTotal = computed(()=> ctx.pomMin.value*60);
    const pomDash = computed(()=>{
      const r=52, c=2*Math.PI*r;

    const pomMMSS = computed(()=>{

      if(s===1) return ctx.t('today.streakOne');
      return ctx.t('today.streakMany',{n:s});
    });

    return { ctx, today, wn, di, isInRange, focusWeek, focusDay, todayDone, toggleTodayFocus,
             noteText, noteSaved, saveNote, ringDash, pomDash, pomMMSS, wkProg, focusBook, streakText, todayKey };

// ════════════════════════════════════════════════════════════════════
// COMPONENT — GraphPane (D3 force-directed knowledge graph)
// ════════════════════════════════════════════════════════════════════
app.component('graph-pane', {
  setup(){
    const ctx = inject('ctx');
    const canvasRef = ref(null);
    const ipanelOpen = ref(false);
    const ipNode = ref(null);
    const search = ref('');
    const filter = ref('all'); // all|found|w14|p2|p3|goal
    const showPrereq = ref(false);

    let gSvg, gZoom, gSim, gNodeSel, gLinkSel, gGroup, gW, gH;

    // upstream prereq set (recursive)
    const upstreamOf = (id)=>{
      const set = new Set(); const queue=[id];
      while(queue.length){
        const cur = queue.shift();
        EDGES.forEach(([s,tg])=>{ if(tg===cur && !set.has(s)){ set.add(s); queue.push(s); } });
      }
      return set;
    };

    const applyFilters = ()=>{
      if(!gNodeSel) return;
      const q = search.value.trim().toLowerCase();
      const ph = filter.value;
      const selId = ipNode.value ? ipNode.value.id : null;
      const prereq = (showPrereq.value && selId) ? upstreamOf(selId) : null;

      gNodeSel.classed('dim', n=>{
        if(prereq) return n.id!==selId && !prereq.has(n.id);
        if(q && !n.lbl.toLowerCase().replace('\n',' ').includes(q) && !n.id.toLowerCase().includes(q)) return true;
        if(ph!=='all' && n.g!==ph) return true;
        return false;
      });
      gLinkSel.classed('prereq', l=> prereq && (prereq.has(l.source.id) || l.source.id===selId) && (prereq.has(l.target.id) || l.target.id===selId));
      gLinkSel.classed('lit', l=> !prereq && selId && (l.source.id===selId || l.target.id===selId));
    };

    watch([search, filter, showPrereq], applyFilters);

    const initGraph = ()=>{
      const wrap = canvasRef.value; if(!wrap) return;
      wrap.innerHTML='';
      const svg = d3.select(wrap).append('svg');
      const g = svg.append('g');
      gGroup = g; gSvg = svg;
      gW = wrap.clientWidth; gH = wrap.clientHeight;

      const defs = svg.append('defs');
      defs.append('marker').attr('id','arr').attr('markerWidth',9).attr('markerHeight',9)
          .attr('refX',32).attr('refY',3.5).attr('orient','auto')
        .append('path').attr('d','M0,0 L0,7 L8,3.5 z').attr('fill','#444c56');
      defs.append('marker').attr('id','arr-lit').attr('markerWidth',9).attr('markerHeight',9)
          .attr('refX',32).attr('refY',3.5).attr('orient','auto')
        .append('path').attr('d','M0,0 L0,7 L8,3.5 z').attr('fill','#58a6ff');
      defs.append('marker').attr('id','arr-pre').attr('markerWidth',9).attr('markerHeight',9)
          .attr('refX',32).attr('refY',3.5).attr('orient','auto')
        .append('path').attr('d','M0,0 L0,7 L8,3.5 z').attr('fill','#d29922');
      const filt = defs.append('filter').attr('id','glow').attr('x','-50%').attr('y','-50%').attr('width','200%').attr('height','200%');
      filt.append('feGaussianBlur').attr('stdDeviation','5').attr('result','blur');
      const m = filt.append('feMerge');
      m.append('feMergeNode').attr('in','blur'); m.append('feMergeNode').attr('in','SourceGraphic');

      gZoom = d3.zoom().scaleExtent([.2,4]).on('zoom', e => g.attr('transform', e.transform));
      svg.call(gZoom);

      const nodeData = NODES.map(d=>({...d}));
      const linkData = EDGES.map(([s,t])=>({source:s, target:t}));

      gSim = d3.forceSimulation(nodeData)
        .force('link', d3.forceLink(linkData).id(d=>d.id).distance(135).strength(.55))
        .force('charge', d3.forceManyBody().strength(-620))
        .force('center', d3.forceCenter(gW/2, gH/2))
        .force('collide', d3.forceCollide(62).strength(.9))
        .force('x', d3.forceX(gW/2).strength(.04))
        .force('y', d3.forceY(gH/2).strength(.04));

      gLinkSel = g.append('g').selectAll('path').data(linkData).join('path')
        .attr('class','glink').attr('marker-end','url(#arr)');

      gNodeSel = g.append('g').selectAll('g').data(nodeData).join('g')
        .attr('class','gnode')
        .call(d3.drag()
          .on('start',(e,d)=>{if(!e.active)gSim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y;})
          .on('drag', (e,d)=>{d.fx=e.x;d.fy=e.y;})
          .on('end',  (e,d)=>{if(!e.active)gSim.alphaTarget(0);d.fx=null;d.fy=null;}))
        .on('mouseenter',(e,d)=>showTip(e,d))
        .on('mousemove', e=>moveTip(e))
        .on('mouseleave',()=>hideTip())
        .on('click',(e,d)=>{e.stopPropagation(); openNode(d);});

      svg.on('click',()=> closeNode());

      const rRing = d => d.g==='goal'?40:d.g==='found'?34:28;
      const rCore = d => d.g==='goal'?24:d.g==='found'?18:14;

      gNodeSel.append('circle').attr('class','ring')
        .attr('r', rRing).attr('fill', d=>GCH[d.g]+'1f')
        .attr('stroke', d=>GCH[d.g]).attr('stroke-width', 1.9);

      gNodeSel.append('circle').attr('class','core')
        .attr('r', rCore).attr('fill', d=>GCH[d.g]+'4a').attr('stroke','none');

      gNodeSel.each(function(d){
        const el = d3.select(this);
        const lines = d.lbl.split('\n'); const lh=12;
        const baseY = lines.length>1 ? -(lh*(lines.length-1)/2) : 0;
        lines.forEach((ln,i)=> el.append('text').attr('dy', baseY+i*lh+4).attr('x',0).text(ln));
      });

      gSim.on('tick',()=>{
        gLinkSel.attr('d', d=>{
          const dx=d.target.x-d.source.x, dy=d.target.y-d.source.y;
          const qx=(d.source.x+d.target.x)/2+dy*.2, qy=(d.source.y+d.target.y)/2-dx*.2;
          return `M${d.source.x},${d.source.y}Q${qx},${qy} ${d.target.x},${d.target.y}`;
        });
        gNodeSel.attr('transform', d=>`translate(${d.x},${d.y})`);
      });
      gSim.on('end', autoFit);
      setTimeout(autoFit, 2400);
    };

    const autoFit = ()=>{
      if(!gGroup) return;
      const bbox = gGroup.node().getBBox();
      if(!bbox.width || !bbox.height) return;
      const pad = 60;
      const scale = Math.min(.95, (gW-pad*2)/bbox.width, (gH-pad*2)/bbox.height);
      const tx = gW/2 - (bbox.x+bbox.width/2)*scale;
      const ty = gH/2 - (bbox.y+bbox.height/2)*scale;
      gSvg.transition().duration(700).ease(d3.easeCubicInOut)
        .call(gZoom.transform, d3.zoomIdentity.translate(tx,ty).scale(scale));
    };

    const tipEl = ()=> document.getElementById('tip');
    const showTip = (e,d)=>{
      const wl = d.wk>0 ? ctx.t('graph.week')+' '+d.wk+' · '+d.book : ctx.t('graph.found')+' · '+d.book;
      tipEl().innerHTML = `<div><strong>${d.lbl.replace('\n',' ')}</strong></div><div class="tip-meta">${wl}</div>`;
      tipEl().classList.add('on'); moveTip(e);
    };
    const moveTip = e=>{ tipEl().style.left=(e.clientX+14)+'px'; tipEl().style.top=(e.clientY-12)+'px'; };
    const hideTip = ()=> tipEl().classList.remove('on');

    const openNode = (d)=>{
      ipNode.value = d; ipanelOpen.value = true;
      gNodeSel.classed('sel', n=>n.id===d.id);
      applyFilters();
    };
    const closeNode = ()=>{
      ipNode.value = null; ipanelOpen.value = false; showPrereq.value = false;
      if(gNodeSel) gNodeSel.classed('sel dim', false);
      if(gLinkSel) gLinkSel.classed('lit prereq', false).attr('marker-end','url(#arr)');
    };

    // recompute "marker-end" based on prereq / lit classes
    watch([showPrereq, ipNode], ()=>{
      if(!gLinkSel) return;
      gLinkSel.attr('marker-end', l=>{
        if(showPrereq.value && ipNode.value){
          const us = upstreamOf(ipNode.value.id);
          if((us.has(l.source.id) || l.source.id===ipNode.value.id) && (us.has(l.target.id) || l.target.id===ipNode.value.id))
            return 'url(#arr-pre)';
        }
        if(!showPrereq.value && ipNode.value && (l.source.id===ipNode.value.id || l.target.id===ipNode.value.id))
          return 'url(#arr-lit)';
        return 'url(#arr)';
      });
    });

    const refocus = (id)=>{
      const n = NODES.find(x=>x.id===id);
      if(!n || !gNodeSel) return;
      let live=null; gNodeSel.each(nd=>{if(nd.id===id) live=nd;});
      if(live) openNode(live);
    };

    const conns = computed(()=>{
      if(!ipNode.value) return [];
      const id = ipNode.value.id;
      const set = new Set();
      EDGES.forEach(([s,t])=>{ if(s===id) set.add(t); if(t===id) set.add(s); });
      return [...set].map(x=> NODES.find(n=>n.id===x));
    });

    const ipBook = computed(()=>{
      if(!ipNode.value) return null;
      const b = BOOKS.find(b=> ipNode.value.book.startsWith(b.title.en.slice(0,3)) || b.key===ipNode.value.book.split(' ')[0]);
      // simpler: match by prefix
      const map = {MML:0, d2l:1, ML:2, DL:3};
      const prefix = Object.keys(map).find(k=> ipNode.value.book.startsWith(k));
      return prefix!==undefined ? BOOKS[map[prefix]] : null;
    });

    onMounted(()=>{ nextTick(initGraph); });
    onBeforeUnmount(()=>{ if(gSim) gSim.stop(); });

    const filters = [
      {key:'all', i18n:'graph.all'},
      {key:'found', i18n:'graph.found', color:GCH.found},
      {key:'w14', i18n:'graph.p1', color:GCH.w14},
      {key:'p2', i18n:'graph.p2', color:GCH.p2},
      {key:'p3', i18n:'graph.p3', color:GCH.p3},
      {key:'goal', i18n:'graph.goal', color:GCH.goal},
    ];

    return { ctx, canvasRef, ipanelOpen, ipNode, search, filter, showPrereq, filters,
             conns, ipBook, closeNode, refocus, autoFit,
             zI:()=>gSvg && gSvg.transition().duration(250).call(gZoom.scaleBy,1.4),
             zO:()=>gSvg && gSvg.transition().duration(250).call(gZoom.scaleBy,.72),
             zR:autoFit, GCH };
  },
  template: `
<div class="pane graph-wrap">
  <div class="gcanvas" ref="canvasRef">
    <div class="graph-toolbar">
      <div class="gsearch">
        <span class="gsearch-ico">🔍</span>
        <input type="text" v-model="search" :placeholder="ctx.t('graph.searchPh')">
      </div>
      <div class="gfilters">
        <button v-for="f in filters" :key="f.key" class="gfilter" :class="{on:filter===f.key}" @click="filter=f.key">
          <span v-if="f.color" class="gfilter-dot" :style="{background:f.color}"></span>
          {{ ctx.t(f.i18n) }}
        </button>
      </div>
    </div>
    <div class="glegend">
      <div style="font-size:.62rem;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:5px">{{ ctx.t('graph.legend') }}</div>
      <div class="leg"><div class="leg-dot" :style="{background:GCH.found}"></div>{{ ctx.t('graph.found') }}</div>
      <div class="leg"><div class="leg-dot" :style="{background:GCH.w14}"></div>{{ ctx.t('graph.p1') }}</div>
      <div class="leg"><div class="leg-dot" :style="{background:GCH.p2}"></div>{{ ctx.t('graph.p2') }}</div>
      <div class="leg"><div class="leg-dot" :style="{background:GCH.p3}"></div>{{ ctx.t('graph.p3') }}</div>
      <div class="leg"><div class="leg-dot" :style="{background:GCH.goal}"></div>{{ ctx.t('graph.goal') }}</div>
    </div>
    <div class="gctrl">
      <button class="gbtn" @click="zI" :title="ctx.t('graph.zoomIn')">+</button>
      <button class="gbtn" @click="zO" :title="ctx.t('graph.zoomOut')">−</button>
      <button class="gbtn" @click="zR" :title="ctx.t('graph.zoomReset')">⊙</button>
    </div>
  </div>

  <aside class="gipanel" :class="{on:ipanelOpen}">
    <div class="gipanel-in" v-if="ipNode">
      <button class="gipanel-x" @click="closeNode">✕</button>
      <div class="gipanel-ttl">{{ ipNode.lbl.replace('\\n',' ') }}</div>
      <div class="gipanel-meta">
        <span class="bdg" :style="{background:GCH[ipNode.g]+'22',color:GCH[ipNode.g],borderColor:GCH[ipNode.g]+'44'}">
          {{ ipNode.g==='found' ? ctx.t('graph.found') : ipNode.g==='w14' ? ctx.t('graph.p1') : ipNode.g==='p2' ? ctx.t('graph.p2') : ipNode.g==='p3' ? ctx.t('graph.p3') : ctx.t('graph.goal') }}
        </span>
        <span class="bdg bdg-dim" v-if="ipNode.wk>0">{{ ctx.t('graph.week') }} {{ ipNode.wk }}</span>
      </div>
      <div class="gipanel-desc">{{ ipNode.desc[ctx.lang.value] }}</div>
      <div class="gipanel-book" v-if="ipBook">
        <span>📖 <b>{{ ipBook.title[ctx.lang.value] }}</b><br><span class="muted" style="font-size:.7rem">{{ ipNode.book }}</span></span>
        <a :href="ipBook.file" target="_blank" class="btn btn-sm">{{ ctx.t('graph.openBook') }}</a>
      </div>
      <div class="gipanel-tool">
        <button class="btn btn-sm" :class="{'btn-prim':showPrereq}" @click="showPrereq=!showPrereq">
          {{ showPrereq ? ctx.t('graph.hidePrereq') : ctx.t('graph.showPrereq') }}
        </button>

</div>
`

// COMPONENT — ProgressPane (heatmap + bars)
// ════════════════════════════════════════════════════════════════════
app.component('progress-pane', {
  setup(){
    const ctx = inject('ctx');

    // Build 12-week × 7-day grid based on START_DATE (Mon May 25, 2026)
    const grid = computed(()=>{
      ctx.bump;
      const logs = dbAllDayLogs();
      const cols = [];
      const todayKey = isoDate(new Date());
      for(let w=0; w<12; w++){
        const col = [];
        for(let d=0; d<7; d++){
          const date = new Date(START_DATE);
          date.setDate(START_DATE.getDate() + w*7 + d);
          const k = isoDate(date);
          const log = logs[k] || {tasks:0, minutes:0};
          const future = date > new Date() && k!==todayKey;
          let lvl = 0;
          if(log.tasks>=4) lvl=4;
          else if(log.tasks===3) lvl=3;
          else if(log.tasks===2) lvl=2;
          else if(log.tasks===1) lvl=1;
          col.push({ date:k, dateObj:date, tasks:log.tasks, minutes:log.minutes, lvl, future, isToday:k===todayKey });
        }
        cols.push(col);
      }
      return cols;
    });

    const totalProg = computed(()=> { ctx.bump; return totalProgress(); });
    const tMin = computed(()=> { ctx.bump; return totalMinutes(); });
    const aDays = computed(()=> { ctx.bump; return activeDays(); });

    const phaseList = [
      {ph:1, color:PC[1]},
      {ph:2, color:PC[2]},
      {ph:3, color:PC[3]},
    ];

    const motivIdx = computed(()=>{
      const p = totalProg.value.pct;
      if(p===0) return 0; if(p<33) return 1; if(p<66) return 2; if(p<100) return 3; return 4;
    });

    const showHeatTip = (e, cell)=>{
      const tip = document.getElementById('tip');
      const dateStr = fmtShortDate(cell.dateObj, ctx.lang.value);
      const tasks = cell.tasks||0;
      const mins = cell.minutes||0;
      tip.innerHTML = `<div><strong>${dateStr}</strong></div><div class="tip-meta">${tasks} ${ctx.t('pg.tasksLbl').toLowerCase()} · ${mins} min</div>`;
      tip.classList.add('on');
      tip.style.left=(e.clientX+14)+'px'; tip.style.top=(e.clientY-12)+'px';
    };
    const hideHeatTip = ()=> document.getElementById('tip').classList.remove('on');

    return { ctx, grid, totalProg, tMin, aDays, phaseList, motivIdx, showHeatTip, hideHeatTip, PC, WEEKS };
  },
  template: `
<div class="pane pg-wrap">
  <div class="pg-body">

    <!-- OVERALL -->
    <div class="overall">
      <div class="ov-top">
        <div class="ov-num">{{ totalProg.pct }}%</div>
        <div class="ov-r">
          <div class="ov-lbl">{{ ctx.t('pg.overall') }}</div>
          <div class="ov-tasks">{{ ctx.t('pg.overallSub',{d:totalProg.done,t:totalProg.tot}) }}</div>
        </div>
      </div>
      <div class="ov-bar"><div class="ov-fill" :style="{width:totalProg.pct+'%'}"></div></div>
      <div class="ov-foot">
        <div class="ov-stat">
          <div class="ov-stat-v">🔥 {{ ctx.streak.value }}</div>
          <div class="ov-stat-l">{{ ctx.t('pg.streakLbl') }}</div>
        </div>
        <div class="ov-stat">
          <div class="ov-stat-v">{{ aDays }}</div>
          <div class="ov-stat-l">{{ ctx.t('pg.daysLbl') }}</div>
        </div>
        <div class="ov-stat">
          <div class="ov-stat-v">{{ Math.round(tMin/60*10)/10 }}h</div>
          <div class="ov-stat-l">{{ ctx.t('pg.minLbl') }}</div>
        </div>
        <div class="ov-stat">
          <div class="ov-stat-v">{{ totalProg.done }}</div>
          <div class="ov-stat-l">{{ ctx.t('pg.tasksLbl') }}</div>
        </div>
      </div>
    </div>

    <!-- HEATMAP -->
    <div class="heatcard">
      <div class="card-ttl"><span class="ttl-ico">📆</span> {{ ctx.t('pg.heatTtl') }}</div>
      <div class="muted" style="font-size:.74rem">{{ ctx.t('pg.heatSub') }}</div>
      <div class="heat-grid">
        <div class="heat-col" v-for="(col,wi) in grid" :key="wi">
          <div v-for="(c,di) in col" :key="di"
               class="heat-cell"
               :class="['l'+c.lvl, {future:c.future}]"
               :style="c.isToday ? 'outline:2px solid #58a6ff;outline-offset:1px' : ''"
               @mouseenter="showHeatTip($event,c)"
               @mousemove="showHeatTip($event,c)"
               @mouseleave="hideHeatTip"></div>
        </div>
      </div>
      <div class="heat-foot">
        <span>{{ ctx.t('pg.scaleLess') }}</span>
        <span class="heat-scale">
          <span class="heat-scale-cells">
            <span class="heat-cell" style="width:11px;height:11px"></span>
            <span class="heat-cell l1" style="width:11px;height:11px"></span>
            <span class="heat-cell l2" style="width:11px;height:11px"></span>
            <span class="heat-cell l3" style="width:11px;height:11px"></span>
            <span class="heat-cell l4" style="width:11px;height:11px"></span>
          </span>
        </span>
        <span>{{ ctx.t('pg.scaleMore') }}</span>
      </div>
    </div>

    <!-- BY PHASE -->
    <div>
      <div class="card-ttl" style="margin-bottom:8px">{{ ctx.t('pg.byPhase') }}</div>
      <div style="display:flex;flex-direction:column;gap:6px">
        <div v-for="ph in phaseList" :key="ph.ph" class="prog-card">
          <div class="prog-row">
            <span class="prog-name">{{ ctx.t('phase.'+ph.ph) }}</span>
            <span class="prog-cnt">{{ ctx.phaseProgress(ph.ph).done }}/{{ ctx.phaseProgress(ph.ph).tot }}</span>
          </div>
          <div class="pbar"><div class="pbfill" :style="{width:ctx.phaseProgress(ph.ph).pct+'%',background:ph.color}"></div></div>
        </div>
      </div>
    </div>

    <!-- BY WEEK -->
    <div>
      <div class="card-ttl" style="margin-bottom:8px">{{ ctx.t('pg.byWeek') }}</div>
      <div style="display:flex;flex-direction:column;gap:5px">
        <div v-for="w in WEEKS" :key="w.n" class="prog-card" style="padding:10px 14px">
          <div class="prog-row" style="margin-bottom:4px">
            <span :style="{fontSize:'.82rem',color: w.n===ctx.cw.value ? PC[w.ph] : 'var(--t1)'}">
              {{ w.n===ctx.cw.value ? '▶ ' : '' }}W{{ w.n }} — {{ w.title[ctx.lang.value] }}
            </span>
            <span class="prog-cnt">{{ ctx.weekProgress(w.n).done }}/{{ ctx.weekProgress(w.n).tot }}</span>
          </div>
          <div class="pbar"><div class="pbfill" :style="{width:ctx.weekProgress(w.n).pct+'%',background:PC[w.ph]+'aa'}"></div></div>
        </div>
      </div>
    </div>

    <!-- MOTIV -->
    <div class="motiv">{{ ctx.t('motiv.'+motivIdx) }}</div>

  </div>
</div>
`
});
